<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David's Shoe Store</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', Arial, sans-serif;
    background: linear-gradient(180deg, #FFE8A3 0%, #FFD166 100%);
    min-height: 100vh; color: #2D2A26; overflow-x: hidden;
  }
  #app { max-width: 920px; margin: 0 auto; padding: 16px; }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    background: #fff; border-radius: 20px; padding: 12px 20px;
    box-shadow: 0 6px 0 #E8B84B; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
  }
  .logo { font-size: 22px; font-weight: 900; color: #FF6B35; display:flex; align-items:center; gap:8px;}
  .stat-pill {
    background: #FFF3D6; border-radius: 14px; padding: 8px 14px;
    font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 6px;
    border: 3px solid #FFD166;
  }
  .stat-pill.cash { border-color: #4CAF50; color:#1B5E20; background:#E8F8E9;}
  .stat-pill.day { border-color: #5B8DEF; color:#0D3B8C; background:#E6EFFE;}
  .stat-pill.debt { border-color: #E2645A; color:#8C1E1E; background:#FDEAE8;}

  .panel {
    background: #fff; border-radius: 22px; padding: 22px;
    box-shadow: 0 8px 0 #E8B84B; margin-bottom: 18px;
  }
  .panel h2 { font-size: 22px; margin-bottom: 12px; color: #FF6B35; display:flex; align-items:center; gap:8px;}
  .panel p.sub { color:#6b6359; font-size:15px; margin-bottom:14px; }

  button {
    font-family: inherit; font-weight: 800; font-size: 16px;
    border: none; border-radius: 16px; padding: 14px 22px;
    cursor: pointer; transition: transform 0.08s ease;
    box-shadow: 0 5px 0 rgba(0,0,0,0.18);
  }
  button:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #FF6B35; color: #fff; }
  .btn-green { background: #4CAF50; color: #fff; }
  .btn-blue { background: #5B8DEF; color: #fff; }
  .btn-purple { background: #9C6BFF; color: #fff; }
  .btn-red { background: #E2645A; color: #fff; }
  .btn-gray { background: #E5E1D8; color: #4A453D; box-shadow: 0 5px 0 #C9C4B7;}
  .btn-big { width: 100%; font-size: 19px; padding: 18px; }

  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .row > * { flex:1; min-width: 140px; }

  .stepper-row { display:flex; align-items:center; gap:12px; margin: 14px 0; flex-wrap: wrap; }
  .stepper-btn {
    width: 54px; height: 54px; border-radius: 50%; font-size: 28px;
    background: #FF6B35; color: #fff; flex: none; padding: 0;
    display:flex; align-items:center; justify-content:center;
  }
  .stepper-btn.dec { background: #E5E1D8; color:#4A453D; box-shadow: 0 5px 0 #C9C4B7;}
  .stepper-val {
    font-size: 26px; font-weight: 900; min-width: 90px; text-align:center;
    background:#FFF3D6; border:3px solid #FFD166; border-radius:14px; padding:8px 10px;
  }
  .stepper-row.sm { gap:8px; margin:6px 0; }
  .stepper-btn.sm { width:38px; height:38px; font-size:19px; }
  .stepper-val.sm { font-size:17px; min-width:54px; padding:5px 8px; }

  .brand-card { border: 3px solid #F1EFE4; border-radius: 16px; padding: 14px; margin-bottom: 14px; }
  .brand-card.firesale-on { border-color: #E2645A; background: #FFF5F5; }
  .brand-card-head { display:flex; align-items:center; gap:8px; border-bottom: 3px solid #eee; padding-bottom:8px; margin-bottom:8px; flex-wrap:wrap; }
  .brand-dot { width:14px; height:14px; border-radius:50%; flex:none; }
  .brand-name { font-weight:900; font-size:16px; flex:1; }
  .brand-cost { font-size:12px; color:#8a8474; font-weight:700; }
  .brand-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .brand-row-label { width:46px; font-weight:800; font-size:13px; color:#6b6359; flex:none; }
  .brand-margin { font-size:13px; font-weight:700; margin-top:6px; }

  .storefront { margin: 10px 0 16px; }
  .sign { background: #FF6B35; color: #fff; text-align:center; font-weight:900; font-size: 16px; padding: 8px; border-radius: 10px 10px 0 0; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.15); }
  .awning { height: 14px; background: repeating-linear-gradient(90deg, #5B8DEF 0 16px, #fff 16px 32px); border-radius: 2px; }
  .facade { background: #F4D9A0; border: 4px solid #C9924A; border-top:none; border-radius: 0 0 14px 14px; padding: 14px; display:flex; gap:14px; align-items:stretch; }
  .window { flex: 1; background: #fff; border-radius: 10px; border: 4px solid #9C6BFF; padding: 10px; min-height: 90px; }
  .shelf-icons { display:flex; flex-direction:column; gap:6px; }
  .shelf-group-label { font-size:11px; font-weight:900; text-transform:uppercase; margin-bottom:3px; }
  .shelf-group-icons { display:flex; flex-wrap:wrap; gap:4px; align-items:center; min-height:20px; }
  .empty-shelf { color:#b5ab94; font-style:italic; font-size: 14px; }
  .more-tag { font-weight:900; color:#9C6BFF; align-self:center; font-size:13px; }
  .door { width: 50px; background: #8C5A2D; border-radius: 8px; position:relative; flex:none; }
  .doorknob { width:8px; height:8px; border-radius:50%; background:#FFD166; position:absolute; right:8px; top:50%; }

  .explainer { background:#E6EFFE; border-left:6px solid #5B8DEF; border-radius:10px; padding:12px 16px; font-size:15px; margin-top:12px; color:#0D3B8C; }
  .explainer.warn { background:#FFF1E0; border-color:#FF9F45; color:#8C4A0D; }
  .explainer.good { background:#E8F8E9; border-color:#4CAF50; color:#1B5E20; }
  .explainer.red { background:#FDEAE8; border-color:#E2645A; color:#8C1E1E; }

  table.statement { width:100%; border-collapse: collapse; font-size:16px; }
  table.statement td { padding: 8px 6px; }
  table.statement tr.line td:first-child { color:#5a554c; }
  table.statement tr.line td:last-child { text-align:right; font-weight:700; }
  table.statement tr.total td { border-top: 3px solid #2D2A26; font-weight:900; font-size:18px; padding-top:10px; }
  table.statement tr.total.good td { color:#1B5E20; }
  table.statement tr.total.bad td { color:#B3261E; }
  table.statement tr.sub td { font-weight:800; padding-top:10px; }
  table.statement tr.interest td { color:#E2645A; }
  table.statement tr.equity-dist td { color:#9C6BFF; }

  .delta { font-size:13px; font-weight:800; padding:3px 9px; border-radius:8px; margin-left:8px; display:inline-block; }
  .delta.pos { background:#E8F8E9; color:#1B5E20; }
  .delta.neg { background:#FDEAE8; color:#B3261E; }

  .badge-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
  .badge { background:#FFF3D6; border:3px solid #FFD166; border-radius:14px; padding:8px 12px; font-size:13px; font-weight:800; display:flex; align-items:center; gap:6px; color:#8C5A00; }

  /* Mode select cards */
  .mode-cards { display:flex; gap:14px; flex-direction:column; }
  .mode-card {
    border-radius: 22px; padding: 22px; cursor: pointer;
    border: 4px solid transparent; transition: transform 0.1s ease;
    box-shadow: 0 8px 0 rgba(0,0,0,0.15);
  }
  .mode-card:hover { transform: translateY(-3px); }
  .mode-card:active { transform: translateY(4px); }
  .mode-card.beginner { background: #E8F8E9; border-color: #4CAF50; }
  .mode-card.intermediate { background: #FFF3D6; border-color: #FFB14C; }
  .mode-card.advanced { background: #FDEAE8; border-color: #E2645A; }
  .mode-card h3 { font-size: 22px; margin-bottom: 6px; }
  .mode-card .mode-sub { font-size:14px; opacity:0.8; margin-bottom:10px; }
  .mode-facts { display:flex; flex-direction:column; gap:4px; font-size:13px; font-weight:700; }
  .mode-facts span { display:flex; align-items:flex-start; gap:6px; }

  /* Turnaround tracker */
  .tracker { border-radius: 16px; padding: 14px; margin-bottom: 14px; border: 3px solid; }
  .tracker.danger { background:#FDEAE8; border-color:#E2645A; }
  .tracker.warning { background:#FFF3D6; border-color:#FFB14C; }
  .tracker.good { background:#E8F8E9; border-color:#4CAF50; }
  .tracker-head { display:flex; align-items:center; gap:10px; font-weight:900; font-size:17px; margin-bottom:8px; }
  .traffic-light { width:22px; height:22px; border-radius:50%; flex:none; }
  .tracker-stats { display:flex; gap:10px; flex-wrap:wrap; }
  .tracker-stat { background:rgba(255,255,255,0.7); border-radius:10px; padding:6px 12px; font-size:13px; font-weight:800; }

  /* Capital raise */
  .capital-split { display:flex; gap:14px; flex-wrap:wrap; }
  .capital-option { flex:1; min-width:200px; border:3px solid; border-radius:16px; padding:16px; }
  .capital-option.loan { border-color:#E2645A; background:#FDEAE8; }
  .capital-option.equity { border-color:#9C6BFF; background:#F3EEFF; }
  .capital-option h4 { font-size:16px; margin-bottom:8px; }
  .capital-preview { background:rgba(255,255,255,0.8); border-radius:10px; padding:10px; margin-top:10px; font-size:13px; line-height:1.7; }

  /* Distress signals */
  .signal-row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  .signal { flex:1; min-width:130px; border-radius:14px; padding:12px; text-align:center; }
  .signal.red { background:#FDEAE8; border:3px solid #E2645A; }
  .signal.yellow { background:#FFF3D6; border:3px solid #FFB14C; }
  .signal-val { font-size:22px; font-weight:900; }
  .signal-label { font-size:12px; font-weight:700; color:#5a554c; margin-top:4px; }

  /* Valuation quiz */
  .vq-steps { display:flex; gap:6px; margin-bottom:18px; }
  .vq-step { flex:1; height:8px; border-radius:4px; background:#F1EFE4; }
  .vq-step.done { background:#4CAF50; }
  .vq-step.active { background:#FF6B35; }
  .vq-formula { background:#F8F5FF; border:3px solid #9C6BFF; border-radius:14px; padding:14px; font-size:16px; margin:12px 0; color:#3D1F7A; font-weight:800; }
  .vq-answer-row { display:flex; align-items:center; gap:10px; margin-top:12px; }

  /* Charts */
  .flow-chart { margin-top: 14px; }
  .flow-row { display:flex; align-items:center; gap:10px; margin-bottom: 10px; }
  .flow-label { width: 150px; font-size: 13px; font-weight:700; color:#5a554c; flex:none; }
  .flow-track { flex:1; background:#F1EFE4; border-radius: 8px; height: 22px; overflow:hidden; }
  .flow-fill { height:100%; border-radius:8px; width:0; transition: width 0.7s cubic-bezier(.2,.8,.3,1); }
  .flow-fill.flow-in { background: #4CAF50; }
  .flow-fill.flow-out { background: #E2645A; }
  .flow-val { width: 80px; text-align:right; font-weight:800; font-size:14px; flex:none; }

  .bs-chart { margin-top: 14px; }
  .bs-bar-label { font-size: 13px; font-weight:800; color:#5a554c; margin-bottom: 6px; }
  .bs-bar { display:flex; height: 34px; border-radius: 10px; overflow:hidden; background:#F1EFE4; }
  .bs-seg { height:100%; width:0; transition: width 0.7s cubic-bezier(.2,.8,.3,1); display:flex; align-items:center; justify-content:center; color:#fff; font-size:11px; font-weight:800; overflow:hidden; }
  .bs-legend { display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; font-size:12px; font-weight:700; }
  .bs-legend span { display:flex; align-items:center; gap:5px; }
  .dot { width:10px; height:10px; border-radius:50%; display:inline-block; }

  /* Customers / simulation */
  .sim-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom: 10px;}
  .sim-stats { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
  .sidewalk { background: #DCEFE0; border-radius: 14px; min-height: 130px; margin-top: 14px; padding: 14px 10px 6px; display:flex; align-items:flex-end; gap: 18px; overflow-x:auto; border: 3px dashed #4CAF50; }
  .sidewalk-empty { color:#5a8d63; font-style:italic; align-self:center; margin:auto; }
  .customer { position: relative; display:flex; flex-direction:column; align-items:center; animation: walkIn 0.35s ease forwards; flex: none; }
  .customer.leaving { animation: walkOut 0.32s ease forwards; }
  .customer.bought .cust-body { box-shadow: 0 0 0 3px #4CAF50; }
  .cust-head { width: 26px; height: 26px; border-radius: 50%; margin-bottom: -4px; }
  .cust-body { width: 36px; height: 38px; border-radius: 14px 14px 6px 6px; }
  .bubble { position:absolute; bottom: 68px; background:#fff; border-radius:10px; padding:6px 10px; font-size:12px; font-weight:800; white-space:nowrap; box-shadow:0 3px 0 rgba(0,0,0,0.12); opacity:0; transform: translateY(6px) scale(0.8); transition: all 0.2s ease; }
  .bubble.show { opacity:1; transform: translateY(0) scale(1); }
  .bubble.happy { color:#1B5E20; border: 2px solid #4CAF50; }
  .bubble.sad { color:#B3261E; border: 2px solid #F2A29A; }
  @keyframes walkIn { from { transform: translateX(-60px); opacity:0; } to { transform: translateX(0); opacity:1; } }
  @keyframes walkOut { from { transform: translateX(0) translateY(0); opacity:1; } to { transform: translateX(50px) translateY(-10px); opacity:0; } }

  /* Swatch / design */
  .swatch-row { display:flex; flex-wrap:wrap; gap:8px; }
  .swatch { width:38px; height:38px; border-radius:50%; padding:0; box-shadow:0 3px 0 rgba(0,0,0,0.15); border:3px solid #fff; }
  .swatch.selected { border-color:#2D2A26; transform:scale(1.12); }

  /* Quiz / valuation input */
  .quiz-input { width:100%; font-size:24px; font-weight:900; padding:12px; border-radius:14px; border:3px solid #FFD166; font-family:inherit; }

  /* Tabbar */
  .tabbar { display:flex; gap:8px; margin-bottom:16px; flex-wrap: wrap; }
  .tab { flex:1; text-align:center; padding:10px; border-radius:14px; font-weight:800; cursor:pointer; background:#F1EFE4; color:#8a8474; font-size:14px; min-width: 120px; }
  .tab.active { background:#FF6B35; color:#fff; }

  /* Modal */
  .modal-bg { position: fixed; inset:0; background: rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px; }
  .modal { background:#fff; border-radius:24px; padding:28px; max-width:520px; width:100%; box-shadow: 0 12px 0 #E8B84B; max-height: 85vh; overflow-y:auto; }
  .modal h2 { color:#FF6B35; font-size:24px; margin-bottom:10px; }
  .big-emoji { font-size:54px; text-align:center; margin:10px 0; }

  @media (max-width:600px) {
    .logo { font-size:17px; }
    .panel { padding:14px; }
    .flow-label { width: 100px; font-size: 12px; }
    .capital-split { flex-direction: column; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   DAVID'S SHOE STORE — financial literacy game
   Three modes: Beginner, Intermediate, Advanced
   ============================================================ */

const STORE_NAME = "David's Shoe Store";
const RENT = 30;
const AD_COST = 15;

const BRANDS = [
  { id:"classic", name:"Classic Kicks",   short:"Classic", cost:15, minPrice:15, maxPrice:50,  defaultPrice:30,  priceStep:5,  popularity:0.5, bulkChance:0.25, unlockLevel:1, color:"#FF6B35" },
  { id:"adidas",  name:"Adidas",          short:"Adidas",  cost:35, minPrice:35, maxPrice:80,  defaultPrice:55,  priceStep:5,  popularity:0.3, bulkChance:0.15, unlockLevel:2, color:"#5B8DEF" },
  { id:"jordans", name:"Nike Air Jordans",short:"Jordans", cost:65, minPrice:65, maxPrice:150, defaultPrice:95,  priceStep:10, popularity:0.2, bulkChance:0.05, unlockLevel:3, color:"#9C6BFF" },
];

const PALETTE = ["#FF6B35","#5B8DEF","#9C6BFF","#4CAF50","#E2588A","#FFD166","#2D2A26","#00BCD4","#FF4757","#E8B84B"];

function SHOE_SVG(color, accent) {
  const a = accent || "#ffffff";
  return `<span style="display:inline-block;"><svg width="30" height="15" viewBox="0 0 100 50" xmlns="http://www.w3.org/2000/svg">
    <path d="M6,21 Q9,14 24,10.5 Q38,8 50,8 Q66,8 78,11 Q90,14 95,21 Q98,25 95,29 Q90,36 78,39 Q66,42 50,42 Q38,42 24,39.5 Q9,36 6,29 Q3,25 6,21 Z" fill="${color}" stroke="#2D2A26" stroke-width="1.2"/>
    <path d="M6,21 Q9,14 24,10.5 Q19,18 19,25 Q19,32 24,39.5 Q9,36 6,29 Q3,25 6,21 Z" fill="#000" opacity="0.16"/>
    <rect x="44" y="9" width="13" height="32" rx="6.5" fill="${a}" opacity="0.92"/>
    <line x1="42" y1="15" x2="59" y2="19" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="59" y1="15" x2="42" y2="19" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="23" x2="59" y2="27" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="59" y1="23" x2="42" y2="27" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="31" x2="59" y2="35" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <line x1="59" y1="31" x2="42" y2="35" stroke="#2D2A26" stroke-width="2" stroke-linecap="round"/>
    <path d="M95,21 Q98,25 95,29 Q90,36 78,39 Q84,32 84,25 Q84,18 78,11 Q90,14 95,21 Z" fill="#000" opacity="0.12"/>
  </svg></span>`;
}

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
function freshState(mode) {
  mode = mode || "beginner";
  const inv = {}, buy = {}, prices = {};
  BRANDS.forEach(b => { inv[b.id] = { units:0, costEach:0 }; buy[b.id] = 0; prices[b.id] = b.defaultPrice; });
  const custom = { id:"custom", name:"My Design", short:"My Design", cost:15, minPrice:15, maxPrice:50, defaultPrice:30, priceStep:5, popularity:0.25, bulkChance:0.2, unlockLevel:1, color:"#FF6B35", accentColor:"#FFFFFF", designed:false };
  inv.custom = { units:0, costEach:0 }; buy.custom = 0; prices.custom = custom.defaultPrice;

  // Advanced mode: inherit a struggling store
  if (mode === "advanced") {
    inv.classic = { units:8, costEach:15 };
    inv.adidas  = { units:5, costEach:35 };
  }

  return {
    screen: mode === "beginner" ? "intro" : mode === "intermediate" ? "intro" : "intro",
    mode,
    day:1, level: mode === "advanced" ? 4 : 1,
    cash: mode === "beginner" ? 100 : mode === "intermediate" ? 10 : 30,
    loan: mode === "advanced" ? 150 : 0,
    loanRate: mode === "advanced" ? 0.02 : 0,  // fraction of principal per day
    dailyInterest: mode === "advanced" ? 3.0 : 0,
    equityShare: 0, equityRaised: 0,
    missedRentDays: 0,
    brandTrends: { classic:0.5, adidas:0.3, jordans:0.2, custom:0.25 },
    brandTrendHistory: { classic:[0.5], adidas:[0.3], jordans:[0.2], custom:[0.25] },
    hotBrand: null,            // { id, daysLeft, boost } — silent, player discovers through sales
    nextEventDay: mode !== "beginner" ? 6+Math.floor(Math.random()*7) : null,
    activeEvent: null,         // { type, label, daysLeft, description }
    totalPenalties: 0,
    history: [], badges: [],
    inventory: inv, customBrand: custom,
    staged: { buy, prices, payRent:false, runAd:false },
    currentDay: null, currentQuiz: null,
    nextInvestorDay: 13,
    consecutiveProfitDays: 0, turnaroundComplete: false,
    valuationQuiz: null,
    activeTab:"income", message:null,
    cameFrom: null, designDraftName: null,
  };
}
let state = freshState();

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function fmt(n) {
  const neg = n < 0;
  return (neg ? "-$" : "$") + Math.round(Math.abs(n)).toLocaleString();
}
function findBrand(id) {
  if (id === state.customBrand.id) return state.customBrand;
  return BRANDS.find(b => b.id === id) || null;
}
function unlockedBrands() {
  const list = BRANDS.filter(b => b.unlockLevel <= state.level);
  if (state.customBrand.designed) list.push(state.customBrand);
  return list;
}
function totalStagedCost(excludeId) {
  return unlockedBrands().reduce((s,b) => s + (b.id===excludeId?0:(state.staged.buy[b.id]||0))*b.cost, 0);
}
function maxBuyable(brand) {
  return Math.max(0, Math.floor((state.cash - totalStagedCost(brand.id)) / brand.cost));
}
function totalShelfStock() {
  return unlockedBrands().reduce((s,b) => s + state.inventory[b.id].units + (state.staged.buy[b.id]||0), 0);
}
function totalUnits() {
  return Object.keys(state.inventory).reduce((s,id) => s + state.inventory[id].units, 0);
}
function inventoryValue() {
  return Object.keys(state.inventory).reduce((s,id) => s + state.inventory[id].units * state.inventory[id].costEach, 0);
}
function netWorth() {
  return state.cash + inventoryValue() + (state.shelfOwned ? 50 : 0) - state.loan;
}
function cashRunway() {
  if (state.dailyInterest <= 0) return 999;
  return Math.floor(state.cash / state.dailyInterest);
}
function recentAvgProfit(days) {
  const slice = state.history.slice(-days);
  if (!slice.length) return 0;
  return slice.reduce((s,r) => s + r.yourProfit, 0) / slice.length;
}

// ── Trend arrow for a brand based on recent trend history
function trendArrow(brandId) {
  const hist = state.brandTrendHistory?.[brandId] || [];
  if (hist.length < 2) return { arrow:"→", color:"#8a8474" };
  const diff = hist[hist.length-1] - hist[hist.length-2];
  if (diff > 0.07) return { arrow:"↑↑", color:"#1B5E20" };
  if (diff > 0.02) return { arrow:"↑",  color:"#4CAF50" };
  if (diff < -0.07) return { arrow:"↓↓", color:"#B3261E" };
  if (diff < -0.02) return { arrow:"↓",  color:"#E2645A" };
  return { arrow:"→", color:"#8a8474" };
}

// ── Apply wrong-answer cash penalty
function applyWrongPenalty() {
  const amt = 5;
  state.cash = Math.max(0, state.cash - amt);
  state.totalPenalties = (state.totalPenalties||0) + amt;
  return amt;
}

// ── Update dynamic brand popularity each day (daily drift + hot brand + events)
function updateBrandTrends() {
  const base = { classic:0.5, adidas:0.3, jordans:0.2, custom:0.25 };
  ["classic","adidas","jordans","custom"].forEach(id => {
    let curr = state.brandTrends[id] ?? base[id];
    // Random drift + slow mean reversion toward base popularity
    curr = Math.max(0.04, Math.min(0.75, curr + (Math.random()-0.5)*0.06 + (base[id]-curr)*0.04));
    state.brandTrends[id] = curr;
    if (!state.brandTrendHistory[id]) state.brandTrendHistory[id] = [];
    state.brandTrendHistory[id].push(curr);
    if (state.brandTrendHistory[id].length > 8) state.brandTrendHistory[id].shift();
  });
  // Hot brand: silent spike, player discovers through trend arrows and sales
  if (state.hotBrand) {
    state.hotBrand.daysLeft--;
    if (state.hotBrand.daysLeft <= 0) state.hotBrand = null;
  }
  if (!state.hotBrand && Math.random() < 0.08) {
    const ub = unlockedBrands();
    if (ub.length) {
      const pick = ub[Math.floor(Math.random()*ub.length)];
      state.hotBrand = { id:pick.id, daysLeft:3+Math.floor(Math.random()*4), boost:1.7+Math.random()*0.8 };
      // Inject a visible jump into trend history so arrows reflect it
      state.brandTrendHistory[pick.id].push(Math.min(0.75,(state.brandTrends[pick.id]||base[pick.id])+0.12));
    }
  }
  // Events shift trends
  if (state.activeEvent?.type === "recession") {
    state.brandTrends.classic = Math.min(0.75, state.brandTrends.classic + 0.04);
    state.brandTrends.jordans = Math.max(0.04, state.brandTrends.jordans - 0.04);
  }
  if (state.activeEvent?.type === "competition") {
    state.brandTrends.adidas = Math.max(0.04, state.brandTrends.adidas - 0.05);
  }
}

// ── Check and fire/expire market events (intermediate + advanced only)
function checkMarketEvents() {
  if (state.mode === "beginner") return;
  if (state.activeEvent) {
    state.activeEvent.daysLeft--;
    if (state.activeEvent.daysLeft <= 0) {
      state.activeEvent = null;
      state.nextEventDay = state.day + 8 + Math.floor(Math.random()*8);
    }
    return;
  }
  if (state.nextEventDay && state.day >= state.nextEventDay) {
    const isRecession = Math.random() < 0.55;
    state.activeEvent = isRecession
      ? { type:"recession",    label:"📉 Recession",       daysLeft:3+Math.floor(Math.random()*3), description:"Consumer spending is tightening. Expect 45% fewer customers and lower willingness to pay." }
      : { type:"competition",  label:"🏪 New Competitor",  daysLeft:4+Math.floor(Math.random()*4), description:"A rival shoe store just opened nearby. Expect 30% fewer customers, especially for Adidas." };
    state.message = { type:"eventAlert", event:state.activeEvent };
  }
}

  if (state.mode === "beginner") return null;
  const d = document.createElement("div");
  if (state.activeEvent) {
    const ev = state.activeEvent;
    d.className = "explainer red";
    d.style.marginBottom = "14px";
    d.innerHTML = `<b>${ev.label} in effect</b> — ${ev.daysLeft} day${ev.daysLeft===1?"":"s"} remaining<br>

  if (!state.nextEventDay) return null;

function shelfHTML(shelfId, getUnits) {
  const ub = unlockedBrands();
  const total = ub.reduce((s,b) => s + getUnits(b), 0);
  let inner = "";
  if (total === 0) {
    inner = `<span class="empty-shelf">Empty shelf — buy some sneakers!</span>`;
  } else {
    ub.forEach(b => {
      const u = getUnits(b); if (u <= 0) return;
      const shown = Math.min(u, 7);
      let icons = "";
      for (let i=0; i<shown; i++) icons += SHOE_SVG(b.color, b.accentColor);
      if (u>7) icons += `<span class="more-tag">+${u-7}</span>`;
      inner += `<div class="shelf-group"><div class="shelf-group-label" style="color:${b.color}">${b.short} (${u})</div><div class="shelf-group-icons">${icons}</div></div>`;
    });

}

        <b>Cost per 5% bought back:</b> ${fmt(Math.round(businessVal*0.05))} <span style="font-size:11px;">(5% of ${fmt(businessVal)})</span><br>
        <b>Buy it all back (${Math.round(state.equityShare*100)}%):</b> ${fmt(Math.round(state.equityShare*businessVal))}
      </div>
      <div class="stepper-row sm">
        <button class="stepper-btn sm dec" id="eqBuybackDec" style="background:#9C6BFF;" ${d.eqBuyback<=0?"disabled":""}>−</button>
        <div class="stepper-val sm" style="color:#3D1F7A;">${d.eqBuyback}%</div>
        <button class="stepper-btn sm" style="background:#9C6BFF;" id="eqBuybackInc" ${d.eqBuyback>=Math.round(state.equityShare*100)?"disabled":""}>+</button>
        <button class="btn-purple" style="font-size:12px;padding:8px 10px;" id="eqBuybackAll">Buy all back</button>
      </div>
      <div class="capital-preview" style="background:rgba(255,255,255,0.85);margin-top:8px;">
        <b>Equity share after buyback:</b> ${Math.round((state.equityShare - buybackPctTotal)*100)}%<br>
        <b>Cost of this buyback:</b> <span style="color:#B3261E;font-weight:900;">${fmt(buybackCost)}</span><br>
        ${buybackPctTotal>0?`<span style="color:#1B5E20;font-size:12px;">✅ You'll keep 100% of profits on that ${d.eqBuyback}% from now on</span>`:""}
      </div>
    </div>` : ""}
    <div class="explainer ${canProceed?"good":"warn"}" style="margin-top:14px;">
      💼 Net cash change: <b>${fmt(netCashChange)}</b> → New balance: <b>${fmt(newCash)}</b>
      ${canProceed ? " ✅" : newCash<0?" — can't spend more than you have!":!isDuringPlay&&newCash<50?" — need at least $50 to open":""}
    </div>
    ${!isDuringPlay&&d.loan>0&&d.equity>0?`<div class="explainer" style="margin-top:8px;">🧮 Example: $40 profit → <b>${fmt(Math.round(40*(1-equityPct)))}</b> after equity share → pay <b>${fmt(loanInterestPerDay)}</b> interest → you keep <b>${fmt(Math.round(40*(1-equityPct)-loanInterestPerDay))}</b>.</div>`:""}
  `;

  const step = 25;
  panel.querySelector("#loanDec").onclick = () => { d.loan=Math.max(0,d.loan-step); render(); };
  panel.querySelector("#loanInc").onclick = () => { d.loan=Math.min(maxLoan,d.loan+step); render(); };
  panel.querySelector("#eqDec").onclick  = () => { d.equity=Math.max(0,d.equity-step); render(); };
  panel.querySelector("#eqInc").onclick  = () => { d.equity=Math.min(200,d.equity+step); render(); };
  if (state.loan > 0) {
    const maxRepay = Math.min(state.loan, Math.max(0, state.cash + totalRaised));
    panel.querySelector("#repayDec").onclick = () => { d.repay=Math.max(0,d.repay-step); render(); };
    panel.querySelector("#repayInc").onclick = () => { d.repay=Math.min(maxRepay,d.repay+step); render(); };
    panel.querySelector("#repayAll").onclick  = () => { d.repay=Math.floor(maxRepay/step)*step; render(); };
  }
  if (canBuyback) {
    const maxBuybackPct = Math.round(state.equityShare * 100); // e.g. 20
    const eqStep = 5;
    panel.querySelector("#eqBuybackDec").onclick = () => { d.eqBuyback=Math.max(0,d.eqBuyback-eqStep); render(); };
    panel.querySelector("#eqBuybackInc").onclick = () => { d.eqBuyback=Math.min(maxBuybackPct,d.eqBuyback+eqStep); render(); };
    panel.querySelector("#eqBuybackAll").onclick  = () => { d.eqBuyback=maxBuybackPct; render(); };
  }
  wrap.appendChild(panel);

  const proceedBtn = document.createElement("button");
  proceedBtn.className = "btn-primary btn-big";
  proceedBtn.disabled = !canProceed;
  proceedBtn.textContent = isDuringPlay ? "Confirm →" : "Open the store with this capital →";
  // If a buyback is selected and quiz not done, show quiz first
  if (canBuyback && d.eqBuyback > 0 && d.bqStep < 2) {
    // Inline buyback quiz rendered above the confirm button
    const bqPanel = document.createElement("div");
    bqPanel.style.cssText = "background:#F3EEFF;border:3px solid #9C6BFF;border-radius:14px;padding:14px;margin-bottom:14px;";
    const bqAns = d.bqAns;
    if (d.bqStep === 0) {
      bqPanel.innerHTML = `<h4 style="color:#3D1F7A;margin-bottom:8px;">🧮 Calculate the buyback price first!</h4>
        <p style="font-size:14px;line-height:1.6;margin-bottom:10px;">Your investor owns <b>${d.eqBuyback}%</b> of the business. Using the same formula you learned:<br>
        Annual profit = ${fmt(avgProfit)}/day × 250 days = <b>${fmt(Math.round(avgProfit*250))}</b><br>
        Business value = annual profit × 3 = ?</p>
        <div class="vq-formula" style="font-size:14px;">Business Value = ${fmt(Math.round(avgProfit*250))} × 3 = ?</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
          <span style="font-weight:900;font-size:18px;">$</span>
          <input type="number" id="bqInp" class="quiz-input" style="font-size:18px;" placeholder="?">
        </div>`;
      const bqBtn = document.createElement("button");
      bqBtn.className = "btn-purple btn-big"; bqBtn.style.marginTop="10px"; bqBtn.textContent = "Check →";
      bqBtn.onclick = () => {
        const v = Number(document.getElementById("bqInp")?.value||0);
        bqAns[0] = v; d.bqStep = 1; render();
      };
      bqPanel.appendChild(bqBtn);
    } else if (d.bqStep === 1) {
      const calcBV = Math.round(avgProfit*250*3);
      const userBV = bqAns[0]||0;
      const bvOk = Math.abs(userBV - calcBV) <= 5;
      bqPanel.innerHTML = `<h4 style="color:#3D1F7A;margin-bottom:8px;">🧮 Step 2: Their stake value</h4>
        <p style="font-size:14px;margin-bottom:6px;">${bvOk ? `✅ Correct! Business value = <b>${fmt(calcBV)}</b>` : `Close! Business value = <b>${fmt(calcBV)}</b> (you said ${fmt(userBV)})`}</p>
        <p style="font-size:14px;line-height:1.6;margin-bottom:10px;">Now calculate <b>${d.eqBuyback}%</b> of ${fmt(calcBV)}:<br>That's what you'll pay to buy back their stake.</p>
        <div class="vq-formula" style="font-size:14px;">${d.eqBuyback}% × ${fmt(calcBV)} = ?</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
          <span style="font-weight:900;font-size:18px;">$</span>
          <input type="number" id="bqInp2" class="quiz-input" style="font-size:18px;" placeholder="?">
        </div>`;
      const bqBtn2 = document.createElement("button");
      bqBtn2.className = "btn-purple btn-big"; bqBtn2.style.marginTop="10px"; bqBtn2.textContent = "Check →";
      bqBtn2.onclick = () => {
        const v = Number(document.getElementById("bqInp2")?.value||0);
        bqAns[1] = v; d.bqStep = 2; render();
      };
      bqPanel.appendChild(bqBtn2);
    }
    wrap.insertBefore(bqPanel, proceedBtn);
    proceedBtn.disabled = true;
    proceedBtn.textContent = "Complete the calculation above first";
  }

  proceedBtn.onclick = () => {
    if (canBuyback && d.eqBuyback > 0 && d.bqStep < 2) return; // quiz not done
    // Apply loan changes
    const blendedRate = (state.loan>0||d.loan>0)
      ? (state.loan*state.loanRate + d.loan*loanRate) / Math.max(1,state.loan+d.loan) : 0;
    state.loan = Math.max(0, state.loan + d.loan - d.repay);
    state.loanRate = state.loan > 0 ? blendedRate : 0;
    state.dailyInterest = state.loan * state.loanRate;
    // Apply equity changes
    state.equityShare = Math.min(0.40, state.equityShare + d.equity*equityPerUnit/25);
    state.equityShare = Math.max(0, state.equityShare - d.eqBuyback/100);
    state.equityRaised += d.equity;
    // Apply cash
    state.cash += netCashChange;
    state._rcDraft = null;
    state.screen = isDuringPlay ? (state.cameFrom||"day") : "day";
    render();
  };
  wrap.appendChild(proceedBtn);

  if (isDuringPlay || state.mode !== "intermediate") {
    const backBtn = document.createElement("button");
    backBtn.className = "btn-gray btn-big";
    backBtn.style.marginTop = "10px";
    backBtn.textContent = "← Back";
    backBtn.onclick = () => { state._rcDraft=null; state.screen=state.cameFrom||"day"; render(); };
    wrap.appendChild(backBtn);
  }
  return wrap;
}

  fireSaleBtn.innerHTML = `🔥 Fire Sale — Sell overstock below cost to raise cash fast<br><small style="font-weight:600;">(Take a loss now to avoid running out of cash)</small>`;
  fireSaleBtn.onclick = () => { state.screen = "day"; state._showFireSaleTip = true; render(); };

  const raiseBtn = document.createElement("button");
  raiseBtn.className = "btn-purple btn-big";
  raiseBtn.innerHTML = `💰 Raise More Capital — Get a bigger loan or bring in an investor<br><small style="font-weight:600;">(More cash, but more cost or dilution)</small>`;
  raiseBtn.onclick = () => { state.cameFrom = "day"; state.screen = "raiseCapital"; render(); };

  const grindBtn = document.createElement("button");

// ─────────────────────────────────────────────
//  TURNAROUND TRACKER (rendered inside dayScreen)
// ─────────────────────────────────────────────
function turnaroundTracker() {
  if (state.mode !== "advanced" || state.turnaroundComplete) return null;
  const runway = cashRunway();
  const avgProfit = recentAvgProfit(3);
  const danger = runway < 5 || avgProfit < -10;
  const warning = !danger && (runway < 12 || avgProfit < 0);
  const good = !danger && !warning;
  const tClass = danger ? "danger" : warning ? "warning" : "good";
  const light = danger ? "#E2645A" : warning ? "#FFB14C" : "#4CAF50";
  const msg = danger ? "⚠️ Critical — act fast!" : warning ? "🟡 Still risky — stay focused" : `🟢 Progress! ${state.consecutiveProfitDays}/5 profitable days`;

  const div = document.createElement("div");
  div.className = `tracker ${tClass}`;
  div.innerHTML = `
    <div class="tracker-head"><div class="traffic-light" style="background:${light}"></div> Turnaround Status: ${msg}</div>
    <div class="tracker-stats">
      <div class="tracker-stat">💵 Cash runway: <b>${runway < 999 ? runway+" days" : "Safe"}</b></div>
      <div class="tracker-stat">📊 3-day avg profit: <b>${fmt(avgProfit)}/day</b></div>
      <div class="tracker-stat">🏦 Loan: <b>${fmt(state.loan)}</b></div>
      <div class="tracker-stat">💸 Daily interest: <b>${fmt(state.dailyInterest)}/day</b></div>
    </div>
    ${danger ? `<div class="explainer red" style="margin-top:8px;">You're ${runway} days from running out of cash. Consider a fire sale on your overstock or raise more capital NOW.</div>` : ""}
  `;
  return div;
}

// ─────────────────────────────────────────────
//  DAY SCREEN
// ─────────────────────────────────────────────
function dayScreen() {
  const wrap = document.createElement("div");

  // Market event meter (intermediate/advanced only)
  const evMeter = eventMeterEl();
  if (evMeter) wrap.appendChild(evMeter);

  // Beginner: if mandatory rent is due and player can't afford it, game over
  if (state.mode === "beginner" && state.level >= 2 && state.cash < RENT) {
    const panel = document.createElement("div");
    panel.className = "panel";
    panel.innerHTML = `
      <h2>🏠 You Can't Pay Rent!</h2>
      <p class="sub">You have <b>${fmt(state.cash)}</b> but rent is <b>${fmt(RENT)}</b>. You can't afford to open the store today.</p>
      <div class="explainer red">💡 <b>This is the most important lesson in business:</b> Never tie up so much cash in inventory that you can't pay your fixed costs. Cash flow matters more than having a full shelf!</div>
      <p class="sub" style="margin-top:12px;">The landlord has locked up the store. Game over — but you learned something real.</p>
    `;
    const restartBtn = document.createElement("button");
    restartBtn.className = "btn-primary btn-big"; restartBtn.style.marginTop="16px";
    restartBtn.textContent = "🔁 Try again";
    restartBtn.onclick = () => { state = freshState("beginner"); state.screen = "intro"; render(); };
    const homeBtn = document.createElement("button");
    homeBtn.className = "btn-gray btn-big"; homeBtn.style.marginTop="10px";
    homeBtn.textContent = "🏠 Back to Home";
    homeBtn.onclick = () => { state = freshState(); state.screen = "modeSelect"; render(); };
    panel.appendChild(restartBtn); panel.appendChild(homeBtn);
    wrap.appendChild(panel);
    return wrap;
  }
  const ub = unlockedBrands();

  // Turnaround tracker (advanced only)
  const tracker = turnaroundTracker();
  if (tracker) wrap.appendChild(tracker);

  // Action buttons row
  const actionRow = document.createElement("div");
  actionRow.className = "row";
  actionRow.style.marginBottom = "14px";

  const designBtn = document.createElement("button");
  designBtn.className = state.customBrand.designed ? "btn-purple" : "btn-blue";
  designBtn.style.fontSize = "14px";
  designBtn.textContent = state.customBrand.designed ? `🎨 Edit "${state.customBrand.name}"` : "🎨 Design Your Own Shoe";
  designBtn.onclick = () => { state.cameFrom="day"; state.designDraftName=null; state.screen="design"; render(); };

  const trendsBtn = document.createElement("button");
  trendsBtn.className = state.showTrendArrows ? "btn-green" : "btn-gray";
  trendsBtn.style.fontSize = "14px";
  trendsBtn.title = state.showTrendArrows ? "Demand trend arrows ON — click to hide" : "Show demand trend arrows as a hint";
  trendsBtn.innerHTML = state.showTrendArrows ? "📊 Trends: ON" : "📊 Trends: OFF";
  trendsBtn.onclick = () => { state.showTrendArrows = !state.showTrendArrows; render(); };

  actionRow.appendChild(designBtn);
  actionRow.appendChild(trendsBtn);

  if (state.mode !== "beginner" || state.history.length > 0) {
    const raiseBtn = document.createElement("button");
    raiseBtn.className = "btn-gray";
    raiseBtn.style.fontSize = "14px";
    raiseBtn.textContent = "💰 Raise Capital";
    raiseBtn.onclick = () => { state.cameFrom="day"; state.screen="raiseCapital"; render(); };
    actionRow.appendChild(raiseBtn);
  }

  if (state.history.length > 0) {
    const stmtBtn = document.createElement("button");
    stmtBtn.className = "btn-gray";
    stmtBtn.style.fontSize = "14px";
    stmtBtn.textContent = "📑 My Statements";
    stmtBtn.onclick = () => { state.cameFrom="day"; state.screen="statements"; render(); };
    actionRow.appendChild(stmtBtn);
  }
  wrap.appendChild(actionRow);

  if (state._showFireSaleTip && state.mode === "advanced") {
    const tip = document.createElement("div");
    tip.className = "explainer red";
    tip.innerHTML = `🔥 <b>Fire Sale mode:</b> In Advanced mode, you can set prices <b>below cost</b> to clear your overstock and raise cash fast. The price stepper goes all the way down to $1. You'll lose money per pair — but getting cash now may save you from bankruptcy.`;
    wrap.appendChild(tip);
    state._showFireSaleTip = false;
  }

  // Buy panel
  const buyPanel = document.createElement("div");
  buyPanel.className = "panel";
  let cardsHtml = "";
  ub.forEach(b => {
    const qty = state.staged.buy[b.id] || 0;
    const price = state.staged.prices[b.id];
    const maxQty = maxBuyable(b);
    const margin = price - b.cost;
    const belowCost = price < b.cost;
    const priceMin = state.mode === "advanced" ? 1 : b.minPrice;
    const ta = state.showTrendArrows ? trendArrow(b.id) : null;
    cardsHtml += `<div class="brand-card${belowCost?" firesale-on":""}">
      <div class="brand-card-head" style="border-color:${b.color};">
        <span class="brand-dot" style="background:${b.color}"></span>
        <span class="brand-name">${b.name}</span>
        ${ta ? `<span style="font-weight:900;font-size:15px;color:${ta.color};margin-left:4px;" title="Demand trend">${ta.arrow}</span>` : ""}
        <span class="brand-cost">Cost ${fmt(b.cost)}/pair</span>
        ${belowCost ? `<span style="color:#E2645A;font-weight:900;font-size:13px;">🔥 FIRE SALE</span>` : ""}
      </div>
      <div class="brand-row">
        <div class="brand-row-label">Buy</div>
        <div class="stepper-row sm">
          <button class="stepper-btn sm dec" data-act="buyDec" data-id="${b.id}" ${qty<=0?"disabled":""}>−</button>
          <div class="stepper-val sm">${qty}</div>
          <button class="stepper-btn sm" data-act="buyInc" data-id="${b.id}" ${qty>=maxQty?"disabled":""}>+</button>
          <button class="btn-gray stepper-max sm" data-act="buyMax" data-id="${b.id}" style="font-size:12px;padding:8px 10px;">Max(${maxQty})</button>
        </div>
      </div>
      <div class="brand-row">
        <div class="brand-row-label">Price</div>
        <div class="stepper-row sm">
          <button class="stepper-btn sm dec" data-act="priceDec" data-id="${b.id}" ${price<=priceMin?"disabled":""}>−</button>
          <div class="stepper-val sm" style="color:${belowCost?"#E2645A":"inherit"}">${fmt(price)}</div>
          <button class="stepper-btn sm" data-act="priceInc" data-id="${b.id}" ${price>=b.maxPrice?"disabled":""}>+</button>
        </div>
      </div>
      <p class="brand-margin" style="color:${margin>0?"#1B5E20":"#B3261E"};">
        ${margin>0 ? `✅ ${fmt(margin)} profit per pair` : belowCost ? `🔥 Fire sale: ${fmt(Math.abs(margin))} loss per pair (cash in hand = ${fmt(price)})` : `⚠️ Breaking even — no profit`}
      </p>
    </div>`;
  });

  buyPanel.innerHTML = `
    <h2>📦 Stock your shelf</h2>
    <p class="sub">Pick how many pairs to buy and set today's price for each brand.
      ${state.mode==="advanced"?" You can go <b>below cost</b> for a fire sale.":""}</p>
    ${shelfHTML("dayShelfIcons", (b)=>state.inventory[b.id].units+(state.staged.buy[b.id]||0))}
    ${cardsHtml}
    <p class="sub">Spending on inventory: <b>${fmt(totalStagedCost())}</b> — you have ${fmt(state.cash)}</p>
  `;
  buyPanel.addEventListener("click", e=>{
    const btn = e.target.closest("button[data-act]");
    if (!btn) return;
    const id = btn.dataset.id, brand = findBrand(id), act = btn.dataset.act;
    const priceMin = state.mode==="advanced" ? 1 : brand.minPrice;
    if (act==="buyDec") state.staged.buy[id]=Math.max(0,(state.staged.buy[id]||0)-1);
    else if (act==="buyInc") state.staged.buy[id]=Math.min(maxBuyable(brand),(state.staged.buy[id]||0)+1);
    else if (act==="buyMax") state.staged.buy[id]=maxBuyable(brand);
    else if (act==="priceDec") state.staged.prices[id]=Math.max(priceMin,state.staged.prices[id]-brand.priceStep);
    else if (act==="priceInc") state.staged.prices[id]=Math.min(brand.maxPrice,state.staged.prices[id]+brand.priceStep);
    render();
  });

  // Bills panel (level 2+)
  let bills = null;
  if (state.level >= 2) {
    bills = document.createElement("div");
    bills.className = "panel";

    if (state.mode === "beginner") {
      // Beginner: rent is mandatory — show it as a fixed cost, no toggle
      bills.innerHTML = `<h2>🧾 Fixed Costs Today</h2>
        <p class="sub">These are automatically deducted when you open — just like the real world.</p>
        <div style="display:flex;align-items:center;gap:12px;background:#FFF1E0;border:3px solid #FF9F45;border-radius:14px;padding:12px 16px;">
          <span style="font-size:24px;">🏠</span>
          <div><b>Rent: ${fmt(RENT)}</b> — deducted automatically each day<br>
          <span style="font-size:13px;color:#6b6359;">Real businesses pay rent on the same day every month, no matter what.</span></div>
        </div>`;
      const adRow = document.createElement("div");
      adRow.style.marginTop = "10px";
      const adBtn = document.createElement("button");
      adBtn.className = state.staged.runAd?"btn-purple":"btn-gray";
      adBtn.innerHTML = `📣 Run an ad (${fmt(AD_COST)})<br><small>Optional — brings in more customers today</small>`;
      adBtn.onclick = ()=>{ state.staged.runAd=!state.staged.runAd; render(); };
      adRow.appendChild(adBtn);
      bills.appendChild(adRow);
    } else {
      // Intermediate/Advanced: rent is a choice — but skipping has consequences
      bills.innerHTML = `<h2>🧾 Today's Bills</h2>`;
      if (state.missedRentDays === 1) {
        const warn = document.createElement("div");
        warn.className = "explainer warn";
        warn.innerHTML = `⚠️ <b>Landlord warning!</b> You skipped rent yesterday. Skip it again and you'll be evicted — game over!`;
        bills.appendChild(warn);
      }
      const rentRow = document.createElement("div");
      rentRow.className = "row";
      const rentBtn = document.createElement("button");
      rentBtn.className = state.staged.payRent?"btn-green":"btn-gray";
      rentBtn.innerHTML = `🏠 Pay rent (${fmt(RENT)})<br><small>${state.missedRentDays>0?"⚠️ PAY NOW or get evicted":"Skip to save cash — risky!"}</small>`;
      rentBtn.onclick = ()=>{ state.staged.payRent=!state.staged.payRent; render(); };
      const adBtn = document.createElement("button");
      adBtn.className = state.staged.runAd?"btn-purple":"btn-gray";
      adBtn.innerHTML = `📣 Run an ad (${fmt(AD_COST)})<br><small>Brings more customers</small>`;
      adBtn.onclick = ()=>{ state.staged.runAd=!state.staged.runAd; render(); };
      rentRow.appendChild(rentBtn); rentRow.appendChild(adBtn);
      bills.appendChild(rentRow);
    }

    if (state.dailyInterest > 0) {
      const intNote = document.createElement("div");
      intNote.className = "explainer warn";
      intNote.style.marginTop = "10px";
      intNote.innerHTML = `🏦 Loan interest: <b>${fmt(state.dailyInterest)}/day</b> auto-deducted (on ${fmt(state.loan)} loan).`;
      bills.appendChild(intNote);
    }
  }

  const rentDue = state.level >= 2;
  const effectiveRent = rentDue ? (state.mode === "beginner" ? RENT : (state.staged.payRent ? RENT : 0)) : 0;
  const billsTotal = effectiveRent + (state.level>=2&&state.staged.runAd?AD_COST:0);
  const canAfford = totalStagedCost()+billsTotal <= state.cash;
  const hasStock = totalShelfStock() > 0;

  const goBtn = document.createElement("button");
  goBtn.className = "btn-primary btn-big";
  goBtn.textContent = "🛎️ Open the doors for today!";
  goBtn.disabled = !canAfford || !hasStock;
  goBtn.onclick = openStore;

  const warn = document.createElement("p");
  warn.className = "sub"; warn.style.textAlign = "center";
  if (!hasStock) warn.textContent = "Buy at least 1 pair of sneakers before you open!";
  else if (!canAfford) warn.textContent = "You can't afford that combination.";

  wrap.appendChild(buyPanel);
  if (bills) wrap.appendChild(bills);
  wrap.appendChild(goBtn);
  if (!canAfford||!hasStock) wrap.appendChild(warn);
  return wrap;
}

function openStore() {
  const ub = unlockedBrands();
  const buyTotalCost = totalStagedCost();
  // Beginner: rent is mandatory once unlocked
  const rentDue = state.level >= 2;
  const payRent = rentDue && (state.mode === "beginner" ? true : state.staged.payRent);
  const runAd = state.level >= 2 && state.staged.runAd;
  const billsTotal = (payRent ? RENT : 0) + (runAd ? AD_COST : 0);

  if (buyTotalCost + billsTotal > state.cash) return;
  if (totalShelfStock() === 0) return;

  ub.forEach(b=>{
    const qty = state.staged.buy[b.id]||0;
    if (qty>0) {
      const before = state.inventory[b.id];
      const nu = before.units+qty, nc = before.units*before.costEach+qty*b.cost;
      state.inventory[b.id] = {units:nu, costEach:nu>0?nc/nu:0};
    }
  });
  state.cash -= (buyTotalCost + billsTotal);

  // Track missed rent for intermediate/advanced
  const rentSkipped = rentDue && !payRent && state.mode !== "beginner";
  if (rentSkipped) {
    state.missedRentDays++;
    if (state.missedRentDays >= 2) {
      // Eviction! Will show modal after finalizing the day
      state._evicted = true;
    }
  } else if (payRent) {
    state.missedRentDays = 0; // reset on payment
  }

  const prices={};
  ub.forEach(b=>{ prices[b.id]=state.staged.prices[b.id]; });
  state.currentDay = { buyTotalCost, prices, payRent, runAd, billsTotal, rentSkipped };
  ub.forEach(b=>{ state.staged.buy[b.id]=0; });
  state.staged.payRent = false;
  state.screen = "simulating";
  render();
}

function buildVisitors(ub, runAd) {
  let count = 5+Math.floor(Math.random()*4);
  if (runAd) count += 3+Math.floor(Math.random()*3);
  if (state.activeEvent?.type === "recession")   count = Math.max(2, Math.round(count*0.55));
  if (state.activeEvent?.type === "competition") count = Math.max(2, Math.round(count*0.70));
  const weighted = ub.map(b => {
    let pop = state.brandTrends?.[b.id] ?? b.popularity;
    if (state.hotBrand?.id === b.id) pop *= state.hotBrand.boost;
    return { brand:b, pop };
  });
  const tw = weighted.reduce((s,w)=>s+w.pop,0);
  const wMult = state.activeEvent?.type === "recession" ? 0.78 : 1;
  return Array.from({length:count}, ()=>{
    let r=Math.random()*tw, chosen=weighted[weighted.length-1].brand;
    for(const w of weighted){if(r<w.pop){chosen=w.brand;break;}r-=w.pop;}
    const willingness=Math.round((chosen.minPrice-5+Math.random()*(chosen.maxPrice-chosen.minPrice+20))*wMult);
    return {brand:chosen, willingness, wantsQty:Math.random()<chosen.bulkChance?2:1};
  });
}

function simulateOutcomes(visitors, prices, snap) {
  const inv={};
  for(const id in snap) inv[id]=snap[id].units;
  let unitsSold=0,revenue=0,cogs=0;
  const perBrandSold={}, events=[];
  for(const v of visitors){
    const b=v.brand, avail=inv[b.id]||0;
    if(avail<=0){events.push({type:"unavailable",brand:b});continue;}
    const price=prices[b.id];
    if(price===undefined||price>v.willingness){events.push({type:"tooexpensive",brand:b});continue;}
    const qty=Math.min(v.wantsQty,avail);
    inv[b.id]-=qty; unitsSold+=qty; revenue+=qty*price; cogs+=qty*snap[b.id].costEach;
    perBrandSold[b.id]=(perBrandSold[b.id]||0)+qty;
    events.push({type:"bought",brand:b,qty});
  }
  return {events,unitsSold,revenue,cogs,endInventory:inv,perBrandSold};
}

function startSimulation() {
  const dayPlan = state.currentDay;
  const ub = unlockedBrands();
  const visitors = buildVisitors(ub, dayPlan.runAd);
  const sim = simulateOutcomes(visitors, dayPlan.prices, state.inventory);
  let idx=0, runningCash=state.cash, runningSold=0, tids=[];
  const runningInv={};
  ub.forEach(b=>{runningInv[b.id]=state.inventory[b.id].units;});
  const sidewalk=document.getElementById("sidewalk"),soldEl=document.getElementById("simSold"),cashEl=document.getElementById("simCash"),skipBtn=document.getElementById("skipBtn");
  if(sidewalk) sidewalk.innerHTML="";
  function done(){tids.forEach(clearTimeout);finalizeDay(dayPlan,sim);}
  if(skipBtn) skipBtn.onclick=done;
  function step(){
    if(idx>=sim.events.length){done();return;}
    const ev=sim.events[idx++];
    const custEl=document.createElement("div");
    custEl.className="customer";
    custEl.innerHTML=`<div class="bubble"></div><div class="cust-head" style="background:${ev.brand.color}"></div><div class="cust-body" style="background:${ev.brand.color}"></div>`;
    if(sidewalk) sidewalk.appendChild(custEl);
    tids.push(setTimeout(()=>{
      const bub=custEl.querySelector(".bubble");
      if(ev.type==="bought"){bub.textContent=ev.qty>1?`${ev.qty} ${ev.brand.short}!`:`${ev.brand.short}!`;bub.classList.add("happy");custEl.classList.add("bought");runningInv[ev.brand.id]-=ev.qty;runningCash+=ev.qty*dayPlan.prices[ev.brand.id];runningSold+=ev.qty;}
      else if(ev.type==="tooexpensive"){bub.textContent=`${ev.brand.short}? Too pricey!`;bub.classList.add("sad");}
      else{bub.textContent=`No ${ev.brand.short}!`;bub.classList.add("sad");}
      bub.classList.add("show");
      if(cashEl) cashEl.textContent=fmt(runningCash);
      if(soldEl) soldEl.textContent=runningSold;
      updateShelf("simShelf",(b)=>runningInv[b.id]||0);
    },280));
    tids.push(setTimeout(()=>{custEl.classList.add("leaving");},830));
    tids.push(setTimeout(()=>{custEl.remove();step();},1150));
  }
  step();
}

function finalizeDay(dayPlan, sim) {
  const invValBefore = inventoryValue();
  const assetsBefore = state.cash+invValBefore+(state.shelfOwned?50:0);
  const grossProfit = sim.revenue-sim.cogs;
  const operatingProfit = grossProfit-dayPlan.billsTotal;
  const interestExpense = Math.round(state.dailyInterest*100)/100;
  const netProfit = operatingProfit-interestExpense;
  const equityPayment = state.equityShare>0 ? Math.max(0,Math.round(netProfit*state.equityShare)) : 0;
  const yourProfit = netProfit-equityPayment;

  state.cash += sim.revenue-interestExpense-equityPayment;
  for(const id in sim.endInventory) if(state.inventory[id]) state.inventory[id].units=sim.endInventory[id];

  const assetsAfter = state.cash+inventoryValue()+(state.shelfOwned?50:0);
  const equityAfter = assetsAfter-state.loan;
  const equityBefore = assetsBefore-state.loan;

  // Turnaround check (advanced)
  if(state.mode==="advanced"&&!state.turnaroundComplete){
    if(yourProfit>0) state.consecutiveProfitDays++;
    else state.consecutiveProfitDays=0;
    if(state.consecutiveProfitDays>=5){
      state.turnaroundComplete=true;
      state.level=Math.max(state.level,5); // unlock Jordans
      state.message={type:"turnaround"};
    }
  }

  state.history.push({
    day:state.day,buyTotalCost:dayPlan.buyTotalCost,prices:dayPlan.prices,
    unitsSold:sim.unitsSold,revenue:sim.revenue,cogs:sim.cogs,grossProfit,
    rent:dayPlan.payRent?RENT:0,ad:dayPlan.runAd?AD_COST:0,billsTotal:dayPlan.billsTotal,
    operatingProfit,interestExpense,netProfit,equityPayment,yourProfit,
    cashEnd:state.cash,perBrandSold:sim.perBrandSold,
    assetsBefore,assetsAfter,equityBefore,equityAfter,equityDelta:equityAfter-equityBefore
  });

  state.currentQuiz={type:pickQuizType(),submitted:false,userAnswer:null,correct:null};

  // Eviction overrides quiz
  if (state._evicted) {
    state._evicted = false;
    state.message = { type:"evicted" };
    state.screen = "end";
    render();
    return;
  }

  state.screen="quiz";
  render();
}

function pickQuizType(){
  const opts=["profit"];
  if(state.level>=3) opts.push("netCashChange");
  if(state.level>=4) opts.push("equity");
  if(state.mode==="intermediate"&&state.equityShare>0) opts.push("equityPayment");
  const weighted=["profit","profit",...opts.filter(o=>o!=="profit")];
  return weighted[Math.floor(Math.random()*weighted.length)];
}

function quizScreen(){
  const r=state.history[state.history.length-1];
  const q=state.currentQuiz;
  const wrap=document.createElement("div");
  const panel=document.createElement("div");
  panel.className="panel";

  let promptHtml="", correctAnswer=0;
  if(q.type==="profit"){
    const brandLines=Object.keys(r.perBrandSold||{}).map(id=>{const b=findBrand(id);const qty=r.perBrandSold[id];const p=r.prices[id];return `<li>${qty} × ${b?b.short:id} at ${fmt(p)} = ${fmt(qty*p)}</li>`;}).join("");
    promptHtml=`<h2>🧮 What's today's profit?</h2>
      <p class="sub">Here's what happened:</p>

      </p>
      <p class="sub" style="font-weight:800;">Your profit (what you actually keep) = ?</p>`;
    correctAnswer=r.yourProfit;
  } else if(q.type==="cash"){
    const prevCash=state.history.length>1?state.history[state.history.length-2].cashEnd:state.mode==="beginner"?100:state.mode==="intermediate"?10:30;
    promptHtml=`<h2>🧮 What's your cash balance now?</h2>
      <p class="sub">Yesterday you had <b>${fmt(prevCash)}</b>.</p>
      <p class="sub">Today: spent ${fmt(r.buyTotalCost)} on inventory${r.billsTotal?`, ${fmt(r.billsTotal)} on bills`:""}${r.interestExpense?`, ${fmt(r.interestExpense)} on interest`:""}${r.equityPayment?`, ${fmt(r.equityPayment)} to equity investor`:""}. Earned ${fmt(r.revenue)} from sales.</p>
      <p class="sub" style="font-weight:800;">What's your cash balance right now?</p>`;
    correctAnswer=r.cashEnd;
  } else if(q.type==="equity"){
    promptHtml=`<h2>🧮 What's your equity (net worth)?</h2>
      <p class="sub">Assets before today: <b>${fmt(r.assetsBefore)}</b> | Loan owed: <b>${fmt(state.loan)}</b></p>
      <p class="sub">After today's activity, your total assets are <b>${fmt(r.assetsAfter)}</b>.</p>
      <p class="sub" style="font-weight:800;">Equity = Assets − What you owe. What's your equity now?</p>`;
    correctAnswer=r.equityAfter;
  } else if(q.type==="equityPayment"){
    promptHtml=`<h2>🧮 How much did your investor earn today?</h2>
      <p class="sub">Your profit before investor's cut was <b>${fmt(r.netProfit)}</b>.</p>
      <p class="sub">Your investor owns <b>${Math.round(state.equityShare*100)}%</b> of your profits.</p>
      <p class="sub" style="font-weight:800;">${Math.round(state.equityShare*100)}% of ${fmt(r.netProfit)} = ?</p>`;
    correctAnswer=r.equityPayment;
  } else if(q.type==="netCashChange"){
    const cashLines=[
      `<li>Revenue from sales: <b>+${fmt(r.revenue)}</b></li>`,
      `<li>Inventory bought: <b>−${fmt(r.buyTotalCost)}</b></li>`,
      r.billsTotal?`<li>Rent &amp; ads: <b>−${fmt(r.billsTotal)}</b></li>`:"",
      r.interestExpense?`<li>Loan interest: <b>−${fmt(r.interestExpense)}</b></li>`:"",
      r.equityPayment?`<li>Equity investor: <b>−${fmt(r.equityPayment)}</b></li>`:"",
    ].filter(Boolean).join("");
    promptHtml=`<h2>🧮 How much did your cash change today?</h2>

      <ul style="margin:6px 0 12px 20px;font-size:15px;line-height:1.9;">${cashLines}</ul>

  panel.innerHTML=`${promptHtml}<div style="display:flex;align-items:center;gap:10px;margin-top:10px;"><span style="font-size:24px;font-weight:900;">$</span><input type="number" id="quizInput" placeholder="0" class="quiz-input" ${q.submitted?"disabled":""}></div>`;

  function doCheck(){
    const el=document.getElementById("quizInput");

  } else {
    const fb=document.createElement("div");
    fb.className="explainer "+(q.correct?"good":"warn");
    fb.innerHTML=q.correct?`🎉 Correct! ${fmt(correctAnswer)}`:(q.userAnswer===null?`The answer is <b>${fmt(correctAnswer)}</b>.`:`You said ${fmt(q.userAnswer)} — the answer is <b>${fmt(correctAnswer)}</b>.`);
    panel.appendChild(fb);
    const contBtn=document.createElement("button");
    contBtn.className="btn-blue btn-big"; contBtn.style.marginTop="12px"; contBtn.textContent="📊 See my statements →";
    contBtn.onclick=()=>{state.screen="results";render();};
    panel.appendChild(contBtn);
  }
  wrap.appendChild(panel);
  return wrap;
}

function advanceDay(){
  state.day+=1; state.screen="day";
  checkLevelUp();
  checkMarketEvents();
  updateBrandTrends();
  if(!state.message && state.day>=state.nextInvestorDay){
    state.screen="valuationQuiz";
    state.nextInvestorDay=state.day+5;
    const recent=state.history.slice(-5);
    const avgProfit=recent.reduce((s,r)=>s+r.yourProfit,0)/Math.max(1,recent.length);
    const avgProfitR=Math.round(avgProfit);        // whole dollar — what the player sees
    const annualProfit=avgProfitR*250;             // consistent: $X/day × 250 = annual
    state.valuationQuiz={
      step:1,
      avgProfit:avgProfitR,
      annualProfit,
      fairLow:Math.round(annualProfit*2),  // 2× annual — low end for small retail
      fairHigh:Math.round(annualProfit*4), // 4× annual — high end for small retail
      offer:Math.round(annualProfit*(2+Math.random()*2)), // random within 2-4× range
      answers:{},submitted:{},correct:{}
    };
  }
  render();
}

function checkLevelUp(){
  if(state.mode==="advanced") return; // advanced starts at level 4
  const m={
    2:{day:4,badge:"First Profit Pro",text:"Bills start today — rent and ads unlock! You've also unlocked Adidas sneakers to stock."},
    3:{day:7,badge:"Cash Detective",text:"Profit and cash are NOT the same thing! Buying lots of inventory eats your cash even on profitable days. You've also unlocked Nike Air Jordans!"},
    4:{day:10,badge:"Balance Sheet Boss",text:"Now you can see the big picture: everything you own vs. everything you owe — the Balance Sheet."},
    5:{day:13,badge:"Valuation Wizard",text:"An investor wants to buy your store. But first — let's calculate what it's actually worth!"}
  };
  for(const lvl of Object.keys(m)){
    const mi=m[lvl];
    if(state.day===mi.day&&state.level<parseInt(lvl)){
      state.level=parseInt(lvl);
      if(!state.badges.includes(mi.badge)) state.badges.push(mi.badge);
      state.message={type:"levelup",level:lvl,badge:mi.badge,text:mi.text};
      break;
    }
  }
}
