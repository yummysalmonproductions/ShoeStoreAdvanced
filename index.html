function cashFlowView(today){
  const d=document.createElement("div");
  const totalBuy=state.history.reduce((s,r)=>s+r.buyTotalCost,0);
  const totalRev=state.history.reduce((s,r)=>s+r.revenue,0);
  const totalBills=state.history.reduce((s,r)=>s+r.billsTotal,0);
  const totalInterest=state.history.reduce((s,r)=>s+(r.interestExpense||0),0);
  const totalEqPmt=state.history.reduce((s,r)=>s+(r.equityPayment||0),0);
  const netCash=totalRev-totalBuy-totalBills-totalInterest-totalEqPmt;
  const maxV=Math.max(totalRev,totalBuy+totalBills+totalInterest+totalEqPmt,Math.abs(netCash),1);
  const bar=(label,mag,val,cls)=>`<div class="flow-row"><div class="flow-label">${label}</div><div class="flow-track"><div class="flow-fill ${cls}" data-w="${Math.round(mag/maxV*100)}"></div></div><div class="flow-val">${fmt(val)}</div></div>`;
  const cashDelta=today?(today.revenue-today.buyTotalCost-today.billsTotal-(today.interestExpense||0)-(today.equityPayment||0)):null;
  d.innerHTML=`<p class="sub">Profit = what you earned on paper. Cash = what's in your pocket. Not always the same!</p>
    <p class="sub">💵 Cash now: <b>${fmt(state.cash)}</b>${cashDelta!==null?` <span class="delta ${cashDelta>=0?"pos":"neg"}">${cashDelta>=0?"▲":"▼"} ${fmt(Math.abs(cashDelta))} today</span>`:""}</p>
    <div class="flow-chart">
      ${bar("Cash in (sales)",totalRev,totalRev,"flow-in")}
      ${bar("Inventory bought",totalBuy,-totalBuy,"flow-out")}
      ${bar("Rent &amp; ads",totalBills,-totalBills,"flow-out")}
      ${totalInterest>0?bar("Loan interest",totalInterest,-totalInterest,"flow-out"):""}
      ${totalEqPmt>0?bar("Equity payouts",totalEqPmt,-totalEqPmt,"flow-out"):""}
      ${bar("Net cash change",Math.abs(netCash),netCash,netCash>=0?"flow-in":"flow-out")}
    </div>
    <div class="explainer">💡 Buying Jordans at $65/pair ties up cash instantly — even if they sell later. This is why businesses can be "profitable" but still run out of cash.</div>`;
  return d;
}

function balanceView(today){
  const d=document.createElement("div");
  const stocked=Object.keys(state.inventory).map(findBrand).filter(b=>b&&state.inventory[b.id].units>0);
  const invVal=inventoryValue();
  const assets=state.cash+invVal+(state.shelfOwned?50:0);
  const equity=assets-state.loan;
  const total=Math.max(assets,1);
  const seg=(val,css,label,bg)=>val>0?`<div class="bs-seg ${css}" style="${bg?"background:"+bg+";":""}" data-w="${Math.round(val/total*100)}">${val/total>0.12?label:""}</div>`:"";
  let invSegs="";
  stocked.forEach(b=>{const v=state.inventory[b.id].units*state.inventory[b.id].costEach;invSegs+=seg(v,"","",b.color);});
  const eqDelta=today?`<span class="delta ${today.equityDelta>=0?"pos":"neg"}">${today.equityDelta>=0?"▲":"▼"} ${fmt(Math.abs(today.equityDelta))} today</span>`:"";
  d.innerHTML=`<p class="sub">A snapshot of what you own vs. what you owe — right now.</p>
    <p class="sub">⚖️ Equity: <b>${fmt(equity)}</b> ${eqDelta}</p>
    <table class="statement">
      <tr class="sub"><td colspan="2">ASSETS (what you OWN)</td></tr>
      <tr class="line"><td>Cash</td><td>${fmt(state.cash)}</td></tr>
      <tr class="line"><td>Inventory</td><td>${fmt(invVal)}</td></tr>
      ${stocked.map(b=>`<tr class="line"><td style="padding-left:18px;color:${b.color};">↳ ${b.short} (${state.inventory[b.id].units})</td><td>${fmt(state.inventory[b.id].units*state.inventory[b.id].costEach)}</td></tr>`).join("")}
      <tr class="sub"><td>Total Assets</td><td>${fmt(assets)}</td></tr>
      <tr class="sub" style="padding-top:16px;"><td colspan="2">LIABILITIES (what you OWE)</td></tr>
      <tr class="line"><td>Loan</td><td>${fmt(state.loan)}</td></tr>
      <tr class="total ${equity>=0?"good":"bad"}"><td>EQUITY (what's truly yours)</td><td>${fmt(equity)}</td></tr>
    </table>
    <div class="bs-chart">
      <div class="bs-bar-label">What you OWN</div>
      <div class="bs-bar">${seg(state.cash,"bs-cash-seg","Cash")}${invSegs}</div>
      <div class="bs-bar-label" style="margin-top:10px;">What you OWE + What's YOURS</div>
      <div class="bs-bar">${seg(state.loan,"bs-loan","Loan")}${seg(equity,"bs-equity","Equity")}</div>
      <div class="bs-legend">
        <span><i class="dot" style="background:#4CAF50;"></i>Cash</span>
        ${stocked.map(b=>`<span><i class="dot" style="background:${b.color};"></i>${b.short}</span>`).join("")}
        <span><i class="dot" style="background:#E2645A;"></i>Loan</span>
        <span><i class="dot" style="background:#5B8DEF;"></i>Equity</span>
      </div>
    </div>
    <div class="explainer">⚖️ <b>Assets = Liabilities + Equity</b>. Both bars are the same length — that's the accounting equation in action!</div>`;
  return d;
}

function animateBars(){
  document.querySelectorAll(".flow-fill,.bs-seg").forEach(el=>{const w=el.getAttribute("data-w");if(w!==null)el.style.width=w+"%";});
}

function statementsScreen(){
  const wrap=document.createElement("div");
  const tabPanel=document.createElement("div"); tabPanel.className="panel";
  const tabbar=document.createElement("div"); tabbar.className="tabbar";
  const tabs=[{id:"income",label:"💰 Income"}];
  if(state.level>=3) tabs.push({id:"cash",label:"💵 Cash Flow"});
  if(state.level>=4) tabs.push({id:"balance",label:"⚖️ Balance Sheet"});
  tabs.forEach(t=>{
    const el=document.createElement("div"); el.className="tab"+(state.activeTab===t.id?" active":"");
    el.textContent=t.label; el.onclick=()=>{state.activeTab=t.id;render();};
    tabbar.appendChild(el);
  });
  tabPanel.appendChild(tabbar);
  if(state.activeTab==="income") tabPanel.appendChild(incomeView());
  else if(state.activeTab==="cash"&&state.level>=3) tabPanel.appendChild(cashFlowView());
  else if(state.activeTab==="balance"&&state.level>=4) tabPanel.appendChild(balanceView());
  else tabPanel.appendChild(incomeView());
  wrap.appendChild(tabPanel);
  const back=document.createElement("button"); back.className="btn-gray btn-big"; back.textContent="← Back";
  back.onclick=()=>{state.screen=state.cameFrom||(state.history.length?"results":"day");render();};
  wrap.appendChild(back);
  setTimeout(animateBars,20);
  return wrap;
}

// ─────────────────────────────────────────────
//  VALUATION QUIZ (multi-step guided calculation)
// ─────────────────────────────────────────────
function valuationQuizScreen(){
  const vq=state.valuationQuiz;
  const wrap=document.createElement("div");
  const panel=document.createElement("div"); panel.className="panel";

  const steps=["Avg Daily Profit","Annual Profit","Fair Low (2×)","Fair High (4×)","The Offer"];
  const stepDots=steps.map((_,i)=>`<div class="vq-step ${i<vq.step-1?"done":i===vq.step-1?"active":""}"></div>`).join("");

  const stepData=[
    {
      q:`<b>Step 1 of 4:</b> Look at your profits from the last 5 days:<br>
         <ul style="margin:8px 0 8px 20px;line-height:1.8;">
           ${state.history.slice(-5).map(r=>`<li>Day ${r.day}: <b>${fmt(r.yourProfit)}</b></li>`).join("")}
         </ul>
         Add them up and divide by ${Math.min(5,state.history.length)}. What's your <b>average daily profit</b>?`,
      correct:vq.avgProfit, hint:"Add all the numbers and divide by the count of days."
    },{
      q:`<b>Step 2 of 4:</b> In real life, businesses are valued on what they earn in a <b>full year</b> — not just one month. A shoe store operates about <b>250 days per year</b>.<br><br>
         Your average daily profit is <b>${fmt(vq.answers[1]||vq.avgProfit)}</b>.<br><br>
         Multiply by <b>250</b> to get your <b>annual profit</b>:`,
      correct:vq.annualProfit, hint:`${fmt(vq.avgProfit)} × 250 = ?`
    },{
      q:`<b>Step 3 of 4:</b> Small retail businesses like shoe stores typically sell for <b>2× to 4× their annual profit</b>. (Bigger public companies trade at much higher multiples, but small shops are valued more conservatively.)<br><br>
         Your annual profit is <b>${fmt(vq.answers[2]||vq.annualProfit)}</b>.<br><br>
         Multiply by <b>2</b> to get the <b>low end</b> of a fair price:`,
      correct:vq.fairLow, hint:`${fmt(vq.annualProfit)} × 2 = ?`
    },{
      q:`<b>Step 4 of 4:</b> Now multiply your annual profit (<b>${fmt(vq.answers[3]||vq.annualProfit)}</b>) by <b>4</b> for the <b>high end</b> of a fair price:`,
      correct:vq.fairHigh, hint:`${fmt(vq.annualProfit)} × 4 = ?`
    }
  ];

  panel.innerHTML=`<h2>🏦 Investor Offer — Calculate It Yourself!</h2>
    <p class="sub">Before we reveal the offer, let's figure out what your store is actually worth.</p>
    <div class="vq-steps">${stepDots}</div>`;

  const currentStep=vq.step-1;
  if(currentStep<4){
    const sd=stepData[currentStep];
    const isSubmitted=vq.submitted[vq.step]!==undefined;
    const isCorrect=vq.correct[vq.step];
    const userAns=vq.answers[vq.step];

    const qDiv=document.createElement("div");
    qDiv.innerHTML=`<p style="font-size:15px;line-height:1.6;margin-bottom:12px;">${sd.q}</p>
      <div class="vq-formula">${["Avg Daily Profit = (sum of recent profits) ÷ number of days","Annual Profit = Avg Daily Profit × 250 selling days","Low Fair Value = Annual Profit × 2","High Fair Value = Annual Profit × 4"][currentStep]}</div>
      <div class="vq-answer-row"><span style="font-size:22px;font-weight:900;">$</span><input type="number" id="vqInput" class="quiz-input" ${isSubmitted?"disabled":""} value="${isSubmitted?(userAns||""):""}" placeholder="?"></div>`;
    panel.appendChild(qDiv);

    if(!isSubmitted){
      const checkBtn=document.createElement("button");
      checkBtn.className="btn-primary btn-big"; checkBtn.style.marginTop="12px"; checkBtn.textContent="✅ Check my answer";
      checkBtn.onclick=()=>{
        const el=document.getElementById("vqInput");
        const val=el?Number(el.value):0;
        const tol=Math.max(2,Math.abs(sd.correct)*0.01); const ok=Math.abs(val-sd.correct)<=tol;
        vq.answers[vq.step]=val; vq.submitted[vq.step]=true; vq.correct[vq.step]=ok;
        render();
      };
      panel.appendChild(checkBtn);
      const skipL=document.createElement("p");
      skipL.className="sub"; skipL.style.cssText="text-align:center;margin-top:8px;cursor:pointer;text-decoration:underline;";
      skipL.textContent="Not sure? Show me the answer";
      skipL.onclick=()=>{vq.answers[vq.step]=sd.correct;vq.submitted[vq.step]=true;vq.correct[vq.step]=false;render();};
      panel.appendChild(skipL);
      setTimeout(()=>{const el=document.getElementById("vqInput");if(el){el.focus();el.addEventListener("keypress",e=>{if(e.key==="Enter")checkBtn.click();});}},10);
    } else {
      const fb=document.createElement("div");
      fb.className="explainer "+(isCorrect?"good":"warn");
      fb.innerHTML=isCorrect?`🎉 Correct! <b>${fmt(sd.correct)}</b>`:`The answer is <b>${fmt(sd.correct)}</b>. ${sd.hint}`;
      panel.appendChild(fb);
      const nextBtn=document.createElement("button");
      nextBtn.className="btn-blue btn-big"; nextBtn.style.marginTop="12px";
      nextBtn.textContent=currentStep<3?"Next step →":"See the investor's offer →";
      nextBtn.onclick=()=>{vq.step++;render();};
      panel.appendChild(nextBtn);
    }
  } else {
    // Step 5: reveal offer + accept/decline
    const offer=vq.offer;
    const fairLow=vq.fairLow, fairHigh=vq.fairHigh;
    const inRange=offer>=fairLow&&offer<=fairHigh;
    const above=offer>fairHigh;
    panel.innerHTML+=`
      <div style="text-align:center;margin:16px 0;">
        <p class="sub">Based on your calculations:</p>
        <p style="font-size:14px;font-weight:800;color:#5a554c;">Fair value range: <b>${fmt(fairLow)}</b> — <b>${fmt(fairHigh)}</b> (2–4× annual profit of ${fmt(vq.annualProfit)})</p>
        <div style="font-size:14px;font-weight:800;margin:8px 0;color:#6b6359;">An investor is offering:</div>
        <div style="font-size:42px;font-weight:900;color:#FF6B35;">${fmt(offer)}</div>
      </div>
      <div class="explainer ${above?"good":inRange?"good":"warn"}">
        ${above?`📈 This offer is <b>ABOVE</b> your fair range — that's a great deal!`:
          inRange?`✅ This offer is <b>WITHIN</b> your fair range — it's fair.`:
          `⚠️ This offer is <b>BELOW</b> your fair range — you might be able to get more!`}
      </div>
      <p class="sub" style="margin-top:14px;font-weight:800;">What do you want to do?</p>
    `;
    const btnRow=document.createElement("div"); btnRow.className="row"; btnRow.style.marginTop="12px";
    const sellBtn=document.createElement("button"); sellBtn.className="btn-green"; sellBtn.textContent="🤝 Accept — sell the store!";
    const keepBtn=document.createElement("button"); keepBtn.className="btn-primary"; keepBtn.textContent="🙅 Decline — keep playing";
    const retiredBtn=document.createElement("button"); retiredBtn.className="btn-blue"; retiredBtn.textContent="🏖️ Retire — end on my terms";
    sellBtn.onclick=()=>resolveInvest(true,offer,fairLow,fairHigh);
    keepBtn.onclick=()=>resolveInvest(false,offer,fairLow,fairHigh);
    retiredBtn.onclick=()=>resolveInvest("retire",offer,fairLow,fairHigh);
    btnRow.appendChild(sellBtn); btnRow.appendChild(keepBtn); btnRow.appendChild(retiredBtn);
    panel.appendChild(btnRow);
  }

  wrap.appendChild(panel);
  return wrap;
}

function resolveInvest(choice,offer,lo,hi){
  if(choice==="retire"){
    state.message={type:"retire"};
  } else if(choice===true){
    state.cash+=offer;
    const verdict=offer>=lo?`Smart move! ${fmt(offer)} was a fair or even generous price. You sold at a good time!`:`You sold for ${fmt(offer)} — but your own calculations showed fair value was ${fmt(lo)}–${fmt(hi)}. You left money on the table!`;
    state.message={type:"invest_result",text:verdict,accepted:true};
  } else {
    const verdict=offer<lo?`Good instinct! ${fmt(offer)} was below your calculated fair range of ${fmt(lo)}–${fmt(hi)}. Smart to hold out.`:`You passed on ${fmt(offer)}, which was actually within your fair range. That's okay — maybe you want to grow more first!`;
    state.message={type:"invest_result",text:verdict,accepted:false};
  }
  state.valuationQuiz=null;
  state.screen="day"; // leave valuationQuiz screen before render so null vq doesn't crash it
  render();
}

// ─────────────────────────────────────────────
//  DESIGN YOUR OWN SHOE
// ─────────────────────────────────────────────
function designScreen(){
  const wrap=document.createElement("div");
  const panel=document.createElement("div"); panel.className="panel";
  const cb=state.customBrand;
  const nameVal=state.designDraftName!==null&&state.designDraftName!==undefined?state.designDraftName:(cb.designed?cb.name:"");
  panel.innerHTML=`<h2>🎨 Design Your Own Shoe!</h2>
    <p class="sub">Pick colors and give your design a name. It'll become a real brand you can stock and sell!</p>
    <div style="display:flex;justify-content:center;margin:18px 0;"><div style="transform:scale(3.2);">${SHOE_SVG(cb.color,cb.accentColor)}</div></div>
    <p class="sub" style="font-weight:800;margin-bottom:6px;">Shoe color</p>
    <div class="swatch-row" id="baseSwatches">${PALETTE.map(c=>`<button class="swatch ${cb.color===c?"selected":""}" data-target="color" data-color="${c}" style="background:${c}"></button>`).join("")}</div>
    <p class="sub" style="font-weight:800;margin:14px 0 6px;">Lace / accent color</p>
    <div class="swatch-row" id="accentSwatches">${PALETTE.map(c=>`<button class="swatch ${cb.accentColor===c?"selected":""}" data-target="accentColor" data-color="${c}" style="background:${c}"></button>`).join("")}</div>
    <p class="sub" style="font-weight:800;margin:14px 0 6px;">Name your design</p>
    <input type="text" id="designName" maxlength="18" value="${nameVal.replace(/"/g,"&quot;")}" placeholder="e.g. Lightning Bolts" class="quiz-input" style="font-size:16px;">`;
  panel.addEventListener("click",e=>{
    const sw=e.target.closest(".swatch"); if(!sw) return;
    const ni=document.getElementById("designName"); if(ni) state.designDraftName=ni.value;
    state.customBrand[sw.dataset.target]=sw.dataset.color; render();
  });
  wrap.appendChild(panel);
  const saveBtn=document.createElement("button"); saveBtn.className="btn-primary btn-big"; saveBtn.textContent="✅ Save my design!";
  saveBtn.onclick=()=>{
    const ni=document.getElementById("designName");
    const name=(ni&&ni.value?ni.value:"").trim().slice(0,18)||"My Design";
    state.customBrand.name=name; state.customBrand.short=name.length>10?name.slice(0,9)+"…":name;
    state.customBrand.designed=true; state.designDraftName=null;
    state.screen=state.cameFrom||"day"; render();
  };
  wrap.appendChild(saveBtn);
  const backBtn=document.createElement("button"); backBtn.className="btn-gray btn-big"; backBtn.style.marginTop="10px"; backBtn.textContent="← Back without saving";
  backBtn.onclick=()=>{state.designDraftName=null;state.screen=state.cameFrom||"day";render();};
  wrap.appendChild(backBtn);
  return wrap;
}

// ─────────────────────────────────────────────
//  END SCREEN
// ─────────────────────────────────────────────
function endScreen(){
  const wrap=document.createElement("div");
  const panel=document.createElement("div"); panel.className="panel";
  const totalProfit=state.history.reduce((s,r)=>s+r.yourProfit,0);
  const finalNetWorth=netWorth();
  panel.innerHTML=`<h2>🏆 ${STORE_NAME} — Game Over!</h2>
    <p class="sub">Total profit over ${state.history.length} days: <b>${fmt(totalProfit)}</b></p>
    <p class="sub">Final net worth: <b>${fmt(finalNetWorth)}</b></p>`;
  if(state.badges.length){
    const br=document.createElement("div"); br.className="badge-row";
    state.badges.forEach(b=>{const el=document.createElement("div");el.className="badge";el.textContent="🏅 "+b;br.appendChild(el);});
    panel.appendChild(br);
  }
  wrap.appendChild(panel);
  const restartBtn=document.createElement("button"); restartBtn.className="btn-primary btn-big"; restartBtn.textContent="🔁 Play again";
  restartBtn.onclick=()=>{state=freshState();state.screen="modeSelect";render();};
  wrap.appendChild(restartBtn);
  return wrap;
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function modalEl(msg){
  const bg=document.createElement("div"); bg.className="modal-bg";
  const box=document.createElement("div"); box.className="modal";

  if(msg.type==="levelup"){
    box.innerHTML=`<div class="big-emoji">🎉</div><h2>Level ${msg.level} unlocked!</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">${msg.text}</p>
      <div class="badge-row"><div class="badge">🏅 ${msg.badge}</div></div>`;
  } else if(msg.type==="invest_result"){
    box.innerHTML=`<div class="big-emoji">${msg.accepted?"🤝":"🏪"}</div>
      <h2>${msg.accepted?"Deal done!":"Keep building!"}</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">${msg.text}</p>`;
  } else if(msg.type==="turnaround"){
    box.innerHTML=`<div class="big-emoji">🏆</div><h2>Turnaround Complete!</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">You did it — 5 profitable days in a row! The store is healthy again. Nike Air Jordans are now unlocked. Keep growing or wait for an investor offer!</p>
      <div class="badge-row"><div class="badge">🏅 Turnaround Artist</div></div>`;
    if(!state.badges.includes("Turnaround Artist")) state.badges.push("Turnaround Artist");
  } else if(msg.type==="retire"){
    box.innerHTML=`<div class="big-emoji">🏖️</div><h2>You Retired!</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">You chose to close the book on <b>${STORE_NAME}</b> on your own terms. Net worth: <b>${fmt(netWorth())}</b>. Well played!</p>`;
  } else if(msg.type==="evicted"){
    box.innerHTML=`<div class="big-emoji">🔒</div><h2>You've Been Evicted!</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">You skipped rent two days in a row. The landlord locked up the store. This is exactly why cash management matters — even when money is tight, some bills can't wait.</p>
      <div class="explainer warn" style="margin-top:10px;">💡 Real businesses sometimes negotiate payment plans, but if you ignore the landlord entirely — this happens!</div>`;
  } else if(msg.type==="eventAlert"){
    const ev=msg.event;
    const isRecession=ev.type==="recession";
    box.innerHTML=`<div class="big-emoji">${isRecession?"📉":"🏪"}</div>
      <h2>${ev.label}</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">${ev.description}</p>
      <div class="explainer warn" style="margin-top:10px;">
        ${isRecession
          ? "💡 During a recession, cheaper brands hold up better. Watch which products customers are still buying — and hold onto cash."
          : "💡 A competitor just opened nearby. <b>Running an ad today can cut the traffic loss from 30% down to ~8%</b> — it brings customers back to you instead. Watch which brands stop selling and adjust your stock."}
      </div>`;
  } else if(msg.type==="confirmHome"){
    box.innerHTML=`<div class="big-emoji">🏠</div><h2>Go back to the home screen?</h2>
      <p style="font-size:16px;line-height:1.5;margin:10px 0;">Your current game progress will be lost. Are you sure?</p>`;
    const yesBtn=document.createElement("button"); yesBtn.className="btn-red btn-big"; yesBtn.textContent="Yes, go home";
    yesBtn.onclick=()=>{ state=freshState(); state.screen="modeSelect"; render(); };
    const noBtn=document.createElement("button"); noBtn.className="btn-gray btn-big"; noBtn.style.marginTop="10px"; noBtn.textContent="← Keep playing";
    noBtn.onclick=()=>{ state.message=null; render(); };
    box.appendChild(yesBtn); box.appendChild(noBtn);
    bg.appendChild(box); return bg;
  }

  const closeBtn=document.createElement("button"); closeBtn.className="btn-primary btn-big"; closeBtn.style.marginTop="16px"; closeBtn.textContent="Continue →";
  closeBtn.onclick=()=>{
    const t=state.message.type;
    const goEnd = t==="invest_result"&&state.message.accepted || t==="retire" || t==="evicted";
    state.message=null;
    if(goEnd) state.screen="end";
    else state.screen="day";
    render();
  };
  box.appendChild(closeBtn);
  bg.appendChild(box);
  return bg;
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
state.screen="modeSelect";
render();
</script>
